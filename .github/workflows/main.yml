name: Auto AI Post Generation

# 1時間ごとに自動実行、またはGitHubの画面から手動で実行可能
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  generate_post:
    runs-on: ubuntu-latest
    permissions:
      contents: write # コードを書き換えて保存する権限
    steps:
      - name: コードを読み込む
        uses: actions/checkout@v4

      - name: Pythonの準備
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 必要なライブラリのインストール
        run: pip install google-genai

      - name: AIスクリプトの実行（Gemini API呼び出し）
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python ai_sns.py

      - name: 生成された投稿データをGitHubに保存
        run: |
          git config --global user.name "AI-Bot"
          git config --global user.email "action@github.com"
          git add posts.json
          git commit -m "Auto-generated AI posts" || exit 0
          git push
